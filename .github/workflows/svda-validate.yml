name: Validate SVDA Candidate PR

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: SVDA contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate candidate and registry contract
        run: python3 scripts/svda/validate_candidate_pr.py --base-ref "origin/${{ github.base_ref }}"
