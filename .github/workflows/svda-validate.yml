name: Validate SVDA Candidate PR

on:
  pull_request:
    paths:
      - "data/venue-candidates/**"
      - "data/venue-registry.json"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate candidate and registry contract
        run: python3 scripts/svda/validate_candidate_pr.py --base-ref "origin/${{ github.base_ref }}"
