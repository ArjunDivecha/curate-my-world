name: SVDA Managed Agent

on:
  workflow_dispatch:
    inputs:
      smoke_only:
        description: "Run setup-only smoke test instead of venue discovery"
        required: false
        type: boolean
        default: true
      source_ref:
        description: "Repository ref for the Managed Agent session to check out"
        required: false
        type: string
        default: ""
      confirm_full_discovery:
        description: "Type RUN_FULL_DISCOVERY to allow a non-smoke run"
        required: false
        type: string
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  run:
    name: Start SVDA Managed Agents session
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runner dependencies
        run: python -m pip install -r requirements.txt

      - name: Start Managed Agents session
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.SVDA_GITHUB_TOKEN || github.token }}
          SVDA_SOURCE_REF: ${{ inputs.source_ref || github.ref_name }}
          SVDA_MAX_SECONDS: "420"
          SVDA_MAX_TOOL_EVENTS: "16"
          SVDA_MAX_WEB_FETCH_EVENTS: "8"
          SVDA_MAX_OUTPUT_TOKENS: "2500"
        run: |
          args=()
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.smoke_only }}" = "true" ]; then
            args+=(--smoke-only)
          elif [ "${{ inputs.confirm_full_discovery }}" != "RUN_FULL_DISCOVERY" ]; then
            echo "Refusing full discovery without confirm_full_discovery=RUN_FULL_DISCOVERY"
            exit 2
          fi
          python scripts/svda/run_managed_agent.py "${args[@]}"
