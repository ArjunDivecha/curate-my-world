name: OpenWiki Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install OpenWiki
        run: npm install --global openwiki

      - name: Run OpenWiki
        run: openwiki --update --print --modelId z-ai/glm-5.2
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Commit and push if changed
        run: |
          git config user.name "openwiki-bot"
          git config user.email "actions@github.com"
          if [ -n "$(git status --porcelain -- openwiki)" ]; then
            git add openwiki
            git commit -m "docs: update OpenWiki [automated]"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No OpenWiki changes to commit."
          fi
